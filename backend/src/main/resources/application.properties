spring.application.name=youtube-sentiment-analysis
server.port=8080
server.servlet.context-path=/

# API Configuration
api.version=1.0.0
api.name=YouTube Comment Sentiment Analysis API

# CORS Configuration
spring.web.cors.allowedOrigins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:8080
spring.web.cors.allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowedHeaders=*
spring.web.cors.allowCredentials=true

# YouTube API Configuration
# Replace YOUR_YOUTUBE_API_KEY_HERE with your actual API key from Google Cloud Console
# Get your key at: https://console.cloud.google.com/
youtube.api.key=${YOUTUBE_API_KEY:}
youtube.max.comments=100
youtube.results.per.page=20

# Sentiment Analysis Configuration
sentiment.min.comments.required=5
sentiment.algorithm=word-based

# Logging Configuration
logging.level.root=WARN
logging.level.com.sentiment.youtube=INFO
logging.level.com.sentiment.youtube.controller=DEBUG
logging.level.com.sentiment.youtube.service=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Optional: File logging
# logging.file.name=logs/youtube-sentiment-analysis.log
# logging.file.max-size=10MB
# logging.file.max-history=10

# Jackson Configuration (JSON serialization)
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# Server Configuration
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# Connection Timeout
server.servlet.session.timeout=30m

# Task Configuration (for async operations if added in future)
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
